[package]
name = "livebloom"
version = "0.5.0"
edition = "2021"

[dependencies]
libloading = "0.8"
nix = { version = "0.29", features = ["fs"] }
anyhow = "1.0"
tempfile = "3"
axum = "0.7"
tokio = { version = "1", features = ["full"] }
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
